# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/km_wiki?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 500MB
      file-size-threshold: 2KB

# JWT配置
jwt:
  secret: kmWikiSecretKey2024ForDevelopmentEnvironmentOnly
  expiration: 86400000  # 24小时，单位毫秒

# 应用配置
app:
  upload:
    path: ./uploads
    max-size: 104857600  # 100MB
  search:
    engine: mysql
  version:
    max-history: 100

# 日志配置
logging:
  level:
    com.km.wiki: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
