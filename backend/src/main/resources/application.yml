# KM/Wiki 知识管理系统 - 主配置文件

spring:
  application:
    name: km-wiki
  
  # 配置文件激活
  profiles:
    active: dev
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:km_wiki}?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 500MB

# 服务器配置
server:
  port: 8180

# JWT配置
jwt:
  secret: ${JWT_SECRET:kmWikiSecretKey2024ForJwtTokenGenerationAndValidation}
  expiration: 86400000  # 24小时，单位毫秒

# 应用自定义配置
app:
  # 文件存储配置
  storage:
    type: local  # local本地存储，可选oss
    local:
      upload-path: ${UPLOAD_PATH:./uploads}
      access-url: /uploads
  
  # 版本配置
  version:
    max-history: 100  # 最大保留版本数
  
  # 分页配置
  pagination:
    default-page-size: 20
    max-page-size: 100

# 日志配置
logging:
  level:
    com.km.wiki: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
